<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reflex Eng - Jennifer's Learning Tool</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>

    <div class="container">
        <div id="login-screen" class="screen">
            <header>
                <h1>Reflex Eng</h1>
                <p>Vui lòng đăng nhập để tiếp tục</p>
            </header>
            <div class="login-box">
                <div id="g_id_onload"
                     data-client_id="404754310046-pks5netfp48lreb7ho3t24o6qt48es9j.apps.googleusercontent.com"
                     data-callback="handleCredentialResponse">
                </div>
                <div class="g_id_signin" data-type="standard"></div>
                <p id="login-error" class="error-msg hidden">Email của bạn không có quyền truy cập!</p>
            </div>
        </div>

        <div id="home-screen" class="screen hidden">
            <header>
                <h1>Reflex Eng</h1>
                <p>Chào Jennifer, chọn chế độ học hôm nay:</p>
            </header>
            <div class="menu-options">
                <button class="menu-btn btn-visual" onclick="startApp('visual')">
                    <strong>1. Học theo hình ảnh</strong>
                    <span>(Nhìn ảnh & Tự nhớ câu thoại)</span>
                </button>
                <button class="menu-btn btn-reflex" onclick="startApp('reflex')">
                    <strong>2. Phản xạ A - B</strong>
                    <span>(Nghe máy nói & Đối đáp lại)</span>
                </button>
                <button class="menu-btn" style="background: var(--dark); box-shadow: 0 4px 12px rgba(30, 41, 59, 0.2);" onclick="startApp('roleplay')">
                    <strong>3. Roleplay Master</strong>
                    <span>(Nghe & Nhập vai - Dành cho hội thoại dài)</span>
                </button>
            </div>
        </div>

        <div id="day-select-screen" class="screen hidden">
            <div class="study-header">
                <button class="back-link" onclick="goHome()">← Quay lại</button>
                <h3>Chọn bài cần học</h3>
            </div>

            <div class="selection-controls" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; padding: 0 5px;">
                <p style="font-size: 13px; color: #64748b; font-style: italic; margin: 0;">Chọn các ngày muốn học:</p>
                <button id="btn-select-all" class="btn-secondary-small" onclick="toggleSelectAll()">
                    Bỏ chọn tất cả
                </button>
            </div>

            <div id="day-checklist" class="day-grid"></div>

            <div class="footer-nav">
                <button class="next-btn" onclick="confirmSelection()">Bắt đầu học ➔</button>
            </div>
        </div>

        <div id="study-screen" class="screen hidden">
            <div class="study-header">
                <button class="back-link" onclick="goHome()">← Quay lại</button>
                <h3 id="mode-title">Chế độ học</h3>
            </div>
            
            <div class="visual-area" onclick="handleVisualClick()">
                <img id="display-img" class="context-img" src="" alt="Ngữ cảnh">
                
                <div id="audio-placeholder" class="hidden" style="text-align: center;">
                    <span style="font-size: 80px;" class="pulse-icon">🎧</span>
                    <p id="placeholder-text" style="font-weight: bold; color: var(--primary); margin-top: 10px; font-size: 18px; text-transform: uppercase;"></p>
                </div>
            </div>

            <div id="speed-control-area">
                <label for="speed-select">Tốc độ nghe:</label>
                <select id="speed-select">
                    <option value="1.0">Bình thường (1x)</option>
                    <option value="0.85" selected>Chậm vừa (0.85x)</option>
                    <option value="0.6">Chậm (0.6x)</option>
                    <option value="0.45">Rất chậm (0.45x)</option>
                </select>
            </div>

            <div id="controls-container" class="control-group">
                <p id="mode-instruction" class="instruction"></p>
                
                <div id="full-audio-container" class="hidden" style="margin-bottom: 15px; text-align: center;">
                    <button class="btn-audio" id="btn-play-full" style="width: 100%; background: #fffbeb; border-color: #f6e05e; color: #b45309;">
                        🔊 Phát toàn bộ hội thoại
                    </button>
                </div>

                <div id="audio-grid" class="audio-grid"></div>
            </div>

            <div class="footer-nav">
                <button class="next-btn" onclick="renderContent()">Shuffle Next ➔</button>
            </div>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
